<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>emir.ai - Multi-Model Control</title><style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0b0c; color: #e3e3e3; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #131314; border-right: 1px solid #282829; display: flex; flex-direction: column; padding: 15px; justify-content: space-between; }
        .sidebar-top { display: flex; flex-direction: column; flex: 1; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .logo span { font-size: 12px; background: #282829; padding: 2px 6px; border-radius: 4px; color: #aaa; }
        .new-chat-btn { background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; margin-bottom: 20px; width: 100%; }
        .chat-list { flex: 1; overflow-y: auto; color: #8e8e93; font-size: 14px; }
        .chat-item { padding: 10px; border-radius: 6px; margin-bottom: 5px; background-color: #1e1e1f; color: #fff; }
        
        .api-settings { background-color: #1e1e1f; padding: 10px; border-radius: 8px; border: 1px solid #282829; }
        .api-settings label { font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; }
        .api-input { width: 100%; background: #0b0b0c; border: 1px solid #282829; border-radius: 4px; padding: 6px; color: #fff; font-size: 12px; outline: none; }

        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #131314; }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        .message .sender { font-size: 12px; color: #8e8e93; margin-bottom: 4px; font-weight: bold; }
        .message .text { padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .message.user .text { background-color: #2b2b2c; color: #fff; border-bottom-right-radius: 2px; }
        .message.bot .text { background-color: #1e1e1f; color: #e3e3e3; border-bottom-left-radius: 2px; border: 1px solid #282829; }
        .input-container { padding: 20px 10%; background-color: #131314; border-top: 1px solid #282829; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background-color: #1e1e1f; border: 1px solid #282829; border-radius: 24px; padding: 14px 20px; color: #fff; font-size: 15px; outline: none; }
        .send-btn { background-color: #fff; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style></head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="logo">emir.ai <span>MULTI-MODEL</span></div>
            <button class="new-chat-btn" onclick="clearChat()">+ Yeni Sohbet</button>
            <div class="chat-list"><div class="chat-item">Canlı Yapay Zeka</div></div>
        </div>
        <div class="api-settings">
            <label>Gemini API Key Girin:</label>
            <input type="password" id="apiKeyInput" class="api-input" placeholder="AI Anahtarını Yapıştırın" onchange="saveApiKey()">
        </div>
    </div>
    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="sender">emir.ai:</div>
                <div class="text">Selam! Ben <strong>emir.ai</strong>. Sol alt taraftaki kutuya geçerli bir Gemini API anahtarı girersen, tamamen gerçek zamanlı ve sınırsız düşünme moduna geçebilirim! Nasıl yardımcı olayım?</div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" class="input-box" id="userInput" placeholder="Message emir.ai..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // Sayfa açıldığında eski anahtar varsa yükle
        if(localStorage.getItem('emir_api_key')) {
            apiKeyInput.value = localStorage.getItem('emir_api_key');
        }

        function saveApiKey() {
            localStorage.setItem('emir_api_key', apiKeyInput.value.trim());
        }

        async function sendMessage() {
            const messageText = userInput.value.trim();
            if (messageText === '') return;

            appendMessage('Kullanıcı', messageText, 'user');
            userInput.value = '';

            const apiKey = localStorage.getItem('emir_api_key') || apiKeyInput.value.trim();
            
            if (!apiKey) {
                setTimeout(() => {
                    appendMessage('emir.ai', "⚠️ Lütfen sol alttaki kutuya geçerli bir <strong>Gemini API Key</strong> girin veya ücretsiz bir anahtar oluşturun.", 'bot');
                }, 400);
                return;
            }

            // Bekleme mesajı ekle
            const waitingId = appendMessage('emir.ai', "Düşünüyor... ⚡", 'bot');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: messageText }] }]
                    })
                });

                const data = await response.json();
                document.getElementById(waitingId).remove(); // Bekleme mesajını sil

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let botReply = data.candidates[0].content.parts[0].text;
                    // Basit markdown temizleme
                    botReply = botReply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    appendMessage('emir.ai', botReply, 'bot');
                } else {
                    appendMessage('emir.ai', "Bir hata oluştu veya geçersiz anahtar girildi. Lütfen API anahtarınızı kontrol edin.", 'bot');
                }
            } catch (error) {
                if(document.getElementById(waitingId)) document.getElementById(waitingId).remove();
                appendMessage('emir.ai', "Bağlantı hatası! API anahtarınız hatalı olabilir veya internet kesildi.", 'bot');
            }
        }

        function appendMessage(sender, text, type) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.id = id;

            const senderDiv = document.createElement('div');
            senderDiv.className = 'sender';
            senderDiv.innerText = sender + ':';

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.innerHTML = text;

            messageDiv.appendChild(senderDiv);
            messageDiv.appendChild(textDiv);
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function handleKeyPress(event) { if (event.key === 'Enter') { sendMessage(); } }
        function clearChat() { chatContainer.innerHTML = `<div class="message bot"><div class="sender">emir.ai:</div><div class="text">Ben <strong>emir.ai</strong>! Canlı moda geçmeye hazırım.</div></div>`; }
    </script>
</body>
</html>
