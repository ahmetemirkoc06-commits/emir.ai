<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>emir.ai - Multi-Model Control</title><style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0b0c; color: #e3e3e3; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #131314; border-right: 1px solid #282829; display: flex; flex-direction: column; padding: 15px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .logo span { font-size: 12px; background: #282829; padding: 2px 6px; border-radius: 4px; color: #aaa; }
        .new-chat-btn { background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; margin-bottom: 20px; }
        .chat-list { flex: 1; overflow-y: auto; color: #8e8e93; font-size: 14px; }
        .chat-item { padding: 10px; border-radius: 6px; margin-bottom: 5px; background-color: #1e1e1f; color: #fff; }
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #131314; }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        .message .sender { font-size: 12px; color: #8e8e93; margin-bottom: 4px; font-weight: bold; }
        .message .text { padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .message.user .text { background-color: #2b2b2c; color: #fff; border-bottom-right-radius: 2px; }
        .message.bot .text { background-color: #1e1e1f; color: #e3e3e3; border-bottom-left-radius: 2px; border: 1px solid #282829; }
        .input-container { padding: 20px 10%; background-color: #131314; border-top: 1px solid #282829; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background-color: #1e1e1f; border: 1px solid #282829; border-radius: 24px; padding: 14px 20px; color: #fff; font-size: 15px; outline: none; }
        .send-btn { background-color: #fff; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style></head>
<body>
    <div class="sidebar">
        <div class="logo">emir.ai <span>MULTI-MODEL</span></div>
        <button class="new-chat-btn" onclick="clearChat()">+ Yeni Sohbet</button>
        <div class="chat-list"><div class="chat-item">Son Sohbet</div></div>
    </div>
    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="sender">emir.ai:</div>
                <div class="text">Ben <strong>emir.ai</strong>! Her iş için en iyi olan yapay zekayı seçip kullanan akıllı bir Multi-Model Kontrol sistemiyim. Size nasıl yardımcı olabilirim?</div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" class="input-box" id="userInput" placeholder="Message emir.ai..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        function generateSmartReply(msg) {
            const text = msg.toLowerCase();
            
            if (text.includes('kedi') && text.includes('çiz')) {
                return "İşte senin için çizdiğim sevimli kedi! 🐾<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;/\\_/\\<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;( o.o )<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&gt; ^ &lt;<br><br>Nasıl olmuş? Başka bir şey çizmemi ister misin?";
            }
            if (text.includes('kedi')) {
                return "Kediler harika canlılardır! Miyav! 🐱 Sana kediler hakkında ilginç bir bilgi vereyim mi, yoksa bir kedi resmi mi çizmemi istersin?";
            }
            if (text.includes('selam') || text.includes('merhaba')) {
                return "Merhaba! Ben **emir.ai**. Bugün senin için hangi yapay zeka modelini devreye sokmamı istersin? Harika işler yapmaya hazırım! 🚀";
            }
            if (text.includes('nasılsın')) {
                return "Çok iyiyim, teşekkürler! Arka planda yüzlerce yapay zeka modelini kontrol edip emirlerini bekliyorum. Sen nasılsın?";
            }
            if (text.includes('oyun') || text.includes('pubg') || text.includes('cuphead')) {
                return "Oyun modu aktif! 🎮 Harika bir oyun seçimi. Strateji mi geliştirmek istersin, yoksa oyun içi teknik bir konuda yardıma mı ihtiyacın var?";
            }
            if (text.includes('ödev') || text.includes('ders') || text.includes('ataturk') || text.includes('atatürk')) {
                return "Eğitim ve Araştırma Modu Devrede! 📚 Konuyu analiz ettim. Ödevin veya sunumun için en doğru ve özet bilgileri hazırlayabilirim. Tam olarak neyi araştırmamı istersin?";
            }
            if (text.includes('kod') || text.includes('html') || text.includes('yazılım')) {
                return "Kod Analiz Modu Aktif! 💻 Kodlarında bir hata mı var, yoksa yepyeni bir özellik mi eklemek istiyorsun? Bana kodu gönder, hemen inceleyeyim!";
            }
            if (text.includes('hava')) {
                return "Hava durumu modülü kontrol ediliyor... Şu an bulunduğun yerde teknoloji üretmek ve kod yazmak için hava fazlasıyla müsait görünüyor! ☀️⚡";
            }
            
            // Genel cevap havuzu (Eğer yukarıdakilerden biri değilse rastgele akıllı cevap verir)
            const defaultReplies = [
                "İstediğin görevi başarıyla aldım! Arka plandaki en güçlü modeli seçip bu soruyu analiz ettim. Harika bir fikir!",
                "Sorgun emir.ai orkestratörü tarafından işlendi. Bu konuda derinlemesine bir araştırma yapmamı ister misin?",
                "Anlaşıldı! multi-model yapay zeka ağı bu istek için yapılandırıldı. Bana biraz daha detay verebilir misin?"
            ];
            return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
        }

        function sendMessage() {
            const messageText = userInput.value.trim();
            if (messageText === '') return;

            appendMessage('Kullanıcı', messageText, 'user');
            userInput.value = '';

            setTimeout(() => {
                const botReply = generateSmartReply(messageText);
                appendMessage('emir.ai', botReply, 'bot');
            }, 500);
        }

        function appendMessage(sender, text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const senderDiv = document.createElement('div');
            senderDiv.className = 'sender';
            senderDiv.innerText = sender + ':';

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            
            // Kalın yazıları formatlama
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            textDiv.innerHTML = formattedText;

            messageDiv.appendChild(senderDiv);
            messageDiv.appendChild(textDiv);
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) { if (event.key === 'Enter') { sendMessage(); } }
        function clearChat() { chatContainer.innerHTML = `<div class="message bot"><div class="sender">emir.ai:</div><div class="text">Ben <strong>emir.ai</strong>! Her iş için en iyi olan yapay zekayı seçip kullanan akıllı bir Multi-Model Kontrol sistemiyim. Size nasıl yardımcı olabilirim?</div></div>`; }
    </script>
</body>
</html>
